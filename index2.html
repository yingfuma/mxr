<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温暖鼓励</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 45px 35px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.18);
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,107,107,0.05), rgba(252,182,159,0.05));
            transform: rotate(45deg);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .icon {
            font-size: 64px;
            margin-bottom: 25px;
            animation: bounce 2.5s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .quote {
            font-size: 19px;
            line-height: 1.9;
            color: #2c3e50;
            margin-bottom: 30px;
            min-height: 110px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.35s ease;
            width: 100%;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(238,90,90,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(238,90,90,0.45);
        }
        .btn-primary:active {
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 14px;
            text-align: center;
        }
        .sparkles {
            position: fixed;
            font-size: 28px;
            animation: float 3.5s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(15deg); opacity: 1; }
        }
        .counter {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <span class="sparkles" style="top:8%;left:8%">✨</span>
    <span class="sparkles" style="top:15%;right:12%;animation-delay:0.4s">🌟</span>
    <span class="sparkles" style="bottom:25%;left:15%;animation-delay:0.8s">💫</span>
    <span class="sparkles" style="bottom:15%;right:8%;animation-delay:1.2s">⭐</span>
    <span class="sparkles" style="top:30%;left:5%;animation-delay:1.6s">🌙</span>
    <span class="sparkles" style="bottom:40%;right:18%;animation-delay:2s">🌈</span>
    
    <div class="card">
        <div class="icon" id="icon">💪</div>
        <p class="quote" id="quote">准备好接收今日的力量了吗？</p>
        <button class="btn btn-primary" id="newQuote">获取新鼓励</button>
        <p class="counter">已获取 <span id="count">0</span> 次鼓励</p>
    </div>
    <p class="footer">触碰NFC标签 · 获取温暖力量 ✨</p>
    
    <script>
        // 150条励志语句
        const quotes = [

            '风雨里做大人，阳光下做孩子。',
            '所有光鲜背后，都是默默咬牙坚持。',
            '不为模糊未来焦虑，只为当下全力以赴。',

            '不负每一个清晨，不负每一次拼搏。',
            '努力不是为了感动谁，只是为了成全自己。',
            '低谷时沉淀，高峰时沉淀。',

            '心定路自稳，人勤路自宽。',
            '但凡辛苦，皆是礼物。',

            '追风赶月莫停留，平芜尽处是春山。',
            '愿你历尽千帆，归来仍是少年。',
            '前路漫漫亦灿灿，往事堪堪亦澜澜。',
            '保持清醒，保持自律，保持上进。',
            '不做口头巨人，只做行动强者。',
            '日子有苦有甜，人生有起有落。',
            '稳住情绪，稳住心态，稳住人生。',
            '你现在的努力，决定未来遇见的人。',
            '别辜负野心，别浪费天赋。',
            '与其纠结过往，不如奔赴未来。',
            '半山腰的风景再好，也不及顶峰辽阔。',
            '默默扎根，悄悄开花，惊艳时光。',
            '人生最好的状态：不卑不亢，向阳生长。',
            '熬过无人理解的日子，才能拥有随心所欲的人生。',
            '心无杂念，全力以赴，自有归途。',
            '不必和别人比，只和昨天的自己比。',
            '一点点变好，就是最好的状态。',
            '生活给你压力，你就还它奇迹。',
            '把目标藏心里，把努力放行动里。',
            '不抱怨环境，只提升自己。',

            '不为一时得失，困住一生前程。',

            '此生只管向上，其余自有安排。'
        ];
        
        const icons = ['💪', '🌟', '🌈', '🌸', '💝', '❤️', '☀️', '🎈', '✨', '💖', '🌺', '🌻', '🦋', '🌙', '⭐', '🔥', '⚡', '💫', '🎯', '🏆'];
        
        let count = 0;
        
        function getRandomQuote() {
            // 随机选择励志语
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const quote = quotes[randomIndex];
            
            // 随机选择图标
            const iconIndex = Math.floor(Math.random() * icons.length);
            const icon = icons[iconIndex];
            
            // 更新显示
            document.getElementById('quote').textContent = quote;
            document.getElementById('icon').textContent = icon;
            
            // 更新计数
            count++;
            document.getElementById('count').textContent = count;
            
            // 添加动画效果
            const card = document.querySelector('.card');
            card.style.transform = 'scale(0.98)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 100);
        }
        
        // 页面加载时显示第一条励志语
        getRandomQuote();
        
        // 点击按钮获取新励志语
        document.getElementById('newQuote').addEventListener('click', getRandomQuote);
        
        // 支持键盘空格键获取新励志语
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                getRandomQuote();
            }
        });
    </script>
</body>
</html>
